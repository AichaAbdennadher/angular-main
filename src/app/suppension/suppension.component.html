<div
  class="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-sans relative overflow-hidden selection:bg-indigo-100">

  <!-- Premium Background Pattern -->
  <div class="absolute inset-0 z-0 opacity-40 pointer-events-none"
    style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px;"></div>

  <!-- Decorative Gradient Orbs -->
  <div
    class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-400/10 rounded-full blur-[120px] pointer-events-none animate-pulse-slow">
  </div>
  <div
    class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-400/10 rounded-full blur-[100px] pointer-events-none animate-pulse-slow delay-1000">
  </div>

  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24 items-center relative z-10">

    <!-- Left Content: Typography & Info -->
    <div class="space-y-10 animate-in slide-in-from-left duration-1000 ease-out">

      <!-- Status Badge -->
      <div
        class="inline-flex items-center gap-2.5 px-4 py-2 rounded-full bg-red-50 border border-red-100 text-red-500 text-[0.7rem] font-black tracking-widest uppercase shadow-sm animate-sun-glow">
        <lucide-icon name="alert-circle" class="w-4 h-4"></lucide-icon>
        STATUT : SUSPENDU
      </div>


      <!-- Main Headline -->
      <div class="space-y-4">
        <h3 class="text-6xl lg:text-[6rem] font-black text-slate-900 leading-[0.85] tracking-tighter"
          style="font-family: 'Outfit', sans-serif;">
          Accès<br />
          <span class="text-indigo-600 drop-shadow-sm">Restreint</span>
        </h3>
        <p class="text-xl text-slate-500 max-w-md mt-6 leading-relaxed font-medium">
          Nous vous informons que votre compte a été suspendu.
        </p>
      </div>

      <!-- Decision Details Box -->
      <div class="relative group/reason animate-in slide-in-from-bottom duration-700 delay-300">
        <div class="bg-white/70 backdrop-blur-md border border-white/60 shadow-2xl shadow-indigo-100/30 rounded-[2.5rem] p-10 relative overflow-hidden transition-all duration-700 hover:shadow-indigo-200/50 hover:-translate-y-2">
          
          <!-- Decorative Quote Decoration -->
          <div class="absolute -right-6 -bottom-10 text-indigo-50/50 select-none pointer-events-none transition-transform duration-700 group-hover/reason:scale-110 group-hover/reason:-rotate-6">
            <span class="text-[14rem] font-serif leading-none italic">"</span>
          </div>

          <div class="relative z-10 space-y-4">
            <h3 class="text-xs font-black text-indigo-600 uppercase tracking-[0.25em]">
              Détails de la décision
            </h3>
            <p class="text-3xl font-bold text-slate-800 italic leading-tight">
              "{{ reason() }}"
            </p>
          </div>

          <!-- Vertical Accent Line -->
          <div class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500 rounded-l-[2.5rem] transition-all duration-700 group-hover/reason:w-3"></div>
        </div>
      </div>


      <!-- Return Button -->
      <div class="animate-in fade-in duration-1000 delay-500 pt-4 flex justify-center">
        <button (click)="goToLogin()"
          class="flex items-center justify-center px-8 py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-black transition-all shadow-xl shadow-slate-900/20 hover:shadow-slate-900/30 hover:-translate-y-1 active:scale-95 group overflow-hidden relative text-base tracking-tight min-w-[240px]">
          <!-- Shimmer Effect -->
          <div
            class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:animate-shimmer">
          </div>
          <span class="relative z-10">Retour à la connexion</span>
        </button>

      </div>

    </div>

    <!-- Right Illustration: 3D Elements -->
    <div class="relative hidden lg:flex justify-center items-center animate-in zoom-in duration-1000 delay-200 group">

      <!-- Concentric Orbital Circles -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none transition-transform duration-1000 group-hover:scale-110">
        <div class="w-[560px] h-[560px] rounded-full border border-indigo-100/40 absolute animate-pulse-slow"></div>
        <div class="w-[440px] h-[440px] rounded-full border border-indigo-200/40 absolute animate-pulse-slow delay-300">
        </div>
        <div class="w-[340px] h-[340px] rounded-full border border-indigo-300/10 absolute bg-indigo-50/10"></div>
      </div>

      <!-- Main Central Card Container (Handles Floating Y only) -->
      <div class="relative z-10 animate-float">
        
        <!-- The Card Itself (Handles Rotation and Scale transitions) -->
        <div
          class="w-80 h-80 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[3rem] shadow-[0_40px_80px_-20px_rgba(79,70,229,0.5)] flex items-center justify-center border border-white/20 transition-all duration-700 rotate-0 group-hover:rotate-12 group-hover:scale-110 group-hover:shadow-[0_50px_100px_-20px_rgba(79,70,229,0.6)]"
        >


          <lucide-icon name="lock" class="w-32 h-32 text-white drop-shadow-2xl transition-transform duration-700 group-hover:scale-110" strokeWidth="1.5"></lucide-icon>

          <!-- Floating Badge: User Removal -->
          <div
            class="absolute -top-8 -right-8 w-24 h-24 bg-white rounded-3xl shadow-2xl flex items-center justify-center border border-indigo-50 animate-float delay-700 transition-all duration-700 group-hover:translate-x-4 group-hover:-translate-y-4">
            <lucide-icon name="user-x" class="w-12 h-12 text-red-500" strokeWidth="2"></lucide-icon>
          </div>

          <!-- Floating Badge: Security Alert -->
          <div
            class="absolute -bottom-6 -left-10 w-20 h-20 bg-white rounded-[2rem] shadow-2xl flex items-center justify-center border border-indigo-50 animate-float-delayed transition-all duration-700 group-hover:-translate-x-4 group-hover:translate-y-4">
            <lucide-icon name="shield-alert" class="w-10 h-10 text-indigo-500" strokeWidth="2"></lucide-icon>
          </div>
        </div>
      </div>

    </div>


  </div>
</div>
