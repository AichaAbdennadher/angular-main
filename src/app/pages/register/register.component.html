<div class="mb-10 flex flex-col items-center text-center">
  <lucide-icon name="message-square" class="text-[#478af5] w-12 h-12 mb-4"></lucide-icon>
  <span class="text-3xl font-black text-slate-900 tracking-tight">
    Hide<span class="text-[#478af5]">Talk</span>
  </span>
  <p class="mt-4 text-slate-500 text-sm font-medium leading-relaxed max-w-xs">
    Un espace anonyme pour s’exprimer librement
  </p>
</div>


<form (submit)="handleSubmit($event)" class="space-y-4">
  <div *ngIf="error()"
    class="p-4 bg-red-50 text-red-600 text-sm rounded-2xl border border-red-100 animate-in fade-in slide-in-from-top-2">
    {{ error() }}
  </div>

  <div class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Nom </label>
        <input type="text" [(ngModel)]="name" name="name"
          class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#478af5] focus:border-transparent outline-none transition-all font-medium"
          placeholder="Nom" />
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Pseudo</label>
        <input type="text" [(ngModel)]="pseudo" name="pseudo"
          class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#478af5] focus:border-transparent outline-none transition-all font-medium"
          placeholder="Pseudo" />
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Email</label>
      <input type="email" [(ngModel)]="email" name="email"
        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#478af5] focus:border-transparent outline-none transition-all font-medium"
        placeholder="Email" />
    </div>

    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Mot de passe</label>
      <input type="password" [(ngModel)]="password" name="password"
        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#478af5] focus:border-transparent outline-none transition-all font-medium"
        placeholder="Mot de passe" />
    </div>

    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Confirmation</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#478af5] focus:border-transparent outline-none transition-all font-medium"
        placeholder="Mot de passe" />
    </div>
  </div>

  <button type="submit" [disabled]="isSubmitting()"
    class="w-full flex justify-center py-3.5 px-4 bg-[#478af5] hover:bg-[#3b74cf] text-white rounded-xl text-sm font-bold shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed mt-4">
    <span *ngIf="isSubmitting()"
      class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin inline-block mr-2"></span>
    <span>{{ isSubmitting() ? 'Création...' : "S'inscrire" }}</span>
  </button>
</form>

<div class="mt-6 text-center">
  <p class="text-sm text-slate-500 font-medium">
    Déjà un compte ?
    <a routerLink="/login" class="text-[#478af5] hover:underline font-bold transition-colors ml-1">
      Se connecter
    </a>
  </p>
</div>
