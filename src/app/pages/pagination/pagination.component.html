<nav class="flex items-center justify-between px-6 py-4 bg-white border-t border-slate-100" aria-label="Table navigation">
  <div class="text-sm text-slate-500">
    Page <span class="font-bold text-slate-900">{{ currentPage }}</span> sur <span class="font-bold text-slate-900">{{ totalPages || 1 }}</span>
  </div>
  
  <ul class="inline-flex items-center gap-1">
    <li>
      <button
        (click)="goToPage(currentPage - 1)"
        [disabled]="currentPage === 1"
        class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 bg-white hover:bg-slate-50 hover:text-[#1d4b99] hover:border-[#1d4b99] disabled:opacity-30 disabled:pointer-events-none transition-all"
      >
        <mat-icon style="font-size: 20px; width: 20px; height: 20px;">chevron_left</mat-icon>
      </button>
    </li>

    <li>
      <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-[#1d4b99] text-white font-bold shadow-lg shadow-[#1d4b99]/20">
        {{ currentPage }}
      </div>
    </li>

    <li>
      <button
        (click)="goToPage(currentPage + 1)"
        [disabled]="currentPage === totalPages || totalPages === 0"
        class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 bg-white hover:bg-slate-50 hover:text-[#1d4b99] hover:border-[#1d4b99] disabled:opacity-30 disabled:pointer-events-none transition-all"
      >
        <mat-icon style="font-size: 20px; width: 20px; height: 20px;">chevron_right</mat-icon>
      </button>
    </li>
  </ul>
</nav>
