<!-- Backdrop overlay -->
<div (click)="close()" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm backdrop"></div>

<!-- Modal Positioning Container -->
<div class="fixed inset-0 z-[110] flex items-center justify-center p-4 pointer-events-none">
    <!-- Modal Card -->
    <div
        class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8 relative border border-gray-100 dark:border-gray-700 modal-content pointer-events-auto">

        <!-- Close Button -->
        <button (click)="close()"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors duration-200 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
            <svg aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>

        <div class="text-center">
            <!-- Icon with pulsed background -->
            <div
                class="mx-auto mb-6 flex items-center justify-center w-20 h-20 rounded-full bg-red-50 dark:bg-red-900/20 border-4 border-red-100 dark:border-red-900/30">
                <lucide-icon name="trash2" class="w-10 h-10 text-red-600 dark:text-red-500"></lucide-icon>
            </div>

            <!-- Content -->
            <h3 class="mb-2 text-xl font-bold text-gray-900 dark:text-white">Confirmer la suppression</h3>
            <p class="mb-8 text-gray-500 dark:text-gray-400 leading-relaxed">
                Êtes-vous sûr de vouloir supprimer ce poste ?
            </p>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row justify-center items-center gap-3">


                <button (click)="close()"
                    class="w-full sm:w-auto px-8 py-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 rounded-xl text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-600 transition-all duration-200">
                    Annuler
                </button>
                <button (click)="confirm()"
                    class="w-full sm:w-auto px-8 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-red-500/20">
                    supprimer
                </button>


            </div>
        </div>
    </div>
</div>
